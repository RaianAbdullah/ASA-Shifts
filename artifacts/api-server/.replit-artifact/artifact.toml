kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["mvn", "-f", "backend/pom.xml", "package", "-DskipTests", "-q"]

[services.production.run]
args = [
  "java",
  "-jar",
  "backend/target/asa-workforce-0.0.1-SNAPSHOT.jar",
  "--spring.profiles.active=production"
]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
