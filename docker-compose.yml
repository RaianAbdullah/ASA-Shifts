version: '3.9'

# ASA Workforce — Docker Compose for local development
#
# This is for LOCAL development only. Do NOT use this compose file for production.
# Production runs on a hardened server with separate secrets management.
#
# Usage:
#   docker-compose up postgres redis          # Start only dependencies
#   docker-compose up                          # Start everything
#   docker-compose down -v                     # Destroy all data

services:

  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: asa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asa_workforce
      POSTGRES_USER: ${DB_USER:-asa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_local_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-asa_user} -d asa_workforce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: asa_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_local_only}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_local_only}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Spring Boot API =====
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: asa_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      SPRING_PROFILES_ACTIVE: production
      DATABASE_URL: jdbc:postgresql://postgres:5432/asa_workforce
      DATABASE_USERNAME: ${DB_USER:-asa_user}
      DATABASE_PASSWORD: ${DB_PASSWORD:-changeme_local_only}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_local_only}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
