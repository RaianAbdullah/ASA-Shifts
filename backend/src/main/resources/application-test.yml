# Test profile (SPRING_PROFILES_ACTIVE=test)
# Used by automated tests. Testcontainers provides a real PostgreSQL instance.

logging:
  level:
    com.asa.workforce: DEBUG
    org.springframework.security: WARN

# Spring Boot test slice configuration
spring:
  main:
    allow-bean-definition-overriding: true

