# ASA Workforce API — Base Configuration
# Profile-specific files override these values.
# Never put secrets in this file. Use environment variables.

spring:
  application:
    name: asa-workforce-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  # Limit multipart upload size — prevents memory exhaustion / DoS
  servlet:
    multipart:
      max-file-size:    2MB
      max-request-size: 2MB

server:
  # PORT is injected by the Replit artifact workflow (default 8080)
  port: ${PORT:8080}
  servlet:
    # Context path must match the artifact proxy path (/api)
    # All controllers are relative to this prefix.
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
  error:
    # Never expose stack traces or Spring internals in error responses
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
  # Limit request body size — prevents memory exhaustion / DoS attacks
  tomcat:
    max-http-form-post-size: 512KB
    max-swallow-size:        512KB

app:
  cors:
    # Override in each profile. Production must set a specific list.
    allowed-origins: ${ALLOWED_CORS_ORIGINS:*}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  server:
    port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    operationsSorter: alpha
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
