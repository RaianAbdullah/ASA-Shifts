# Production profile (SPRING_PROFILES_ACTIVE=production)
# STRICT security settings. Application MUST fail to start if required env vars
# are missing or insecure defaults are detected.

app:
  cors:
    # REQUIRED: No wildcard CORS in production.
    # Example: https://asa-workforce.example.gov
    allowed-origins: ${ALLOWED_CORS_ORIGINS}

# Disable API documentation in production — never expose Swagger publicly
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.asa.workforce: INFO
    # Never log at DEBUG/TRACE in production — sensitive data may appear

