# Development profile (SPRING_PROFILES_ACTIVE=development)
# Used in the Replit environment and local developer machines.
# Stage 2+ will enable JPA, Redis, Flyway here.

logging:
  level:
    com.asa.workforce: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO

app:
  cors:
    # Development: allow all origins (Expo dev server, web preview)
    allowed-origins: "*"

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

